<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Organizer</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    
    <main class="container">

        <header>
            <h1>Note Organizer</h1>
        </header>

        <section class="form-section">
            <input type="text" id="title" placeholder="Enter Note Title">

            <textarea name="" id="content" placeholder="Write your note here..."></textarea>

            <button id="addBtn">Add Note</button>
        </section>

        <section id="notes">

        </section>
    </main>

    <script src="/js/script.js"></script>
</body>
</html>
